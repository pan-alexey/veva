  <script>
    document.addEventListener("DOMContentLoaded", function (event) {
      const widgets = document.querySelectorAll("[widget-name]");
      for (let i = 0; i < widgets.length; i++) {
        const element = widgets[i];
        const widgetName = element.getAttribute("widget-name");
        const stateId = element.getAttribute("state-id");
        window.__widgets__[widgetName].render(element, { placeHolderId: 1 });
      }
    });
  </script>
